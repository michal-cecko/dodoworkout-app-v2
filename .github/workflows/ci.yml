# CI pipeline: tests, lint, image build/push, and pull-based deploy
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, xml, gd, zip, intl, bcmath, pcntl, exif
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Install NPM dependencies and build assets
        run: npm ci && npm run build

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan package:discover --ansi

      # Non-blocking: surfaces style issues without blocking the deploy.
      # (Pre-migration, the web app auto-deployed via the GitHub webhook
      # regardless of CI, so Pint never gated deploys for this repo.)
      - name: Run Pint
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan test --parallel

  build-image:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Normalize COMPOSER_AUTH to a single compact line so it survives the
      # docker build-args block regardless of how the secret is stored
      # (a multi-line pretty-printed value silently breaks "KEY=VALUE" build-args).
      - name: Normalize COMPOSER_AUTH
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: echo "COMPOSER_AUTH_MIN=$(printf '%s' "$COMPOSER_AUTH" | jq -c .)" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/michal-cecko/dodoworkout-app-v2:latest
            ghcr.io/michal-cecko/dodoworkout-app-v2:sha-${{ github.sha }}
          build-args: |
            COMPOSER_AUTH=${{ env.COMPOSER_AUTH_MIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Pin web + worker to the new image and deploy (pull, no host build)
        env:
          API: ${{ secrets.DOKPLOY_URL }}
          KEY: ${{ secrets.DOKPLOY_API_KEY }}
          WORKER: ${{ secrets.DOKPLOY_WORKER_APPLICATION_ID }}
          IMG: ghcr.io/michal-cecko/dodoworkout-app-v2:sha-${{ github.sha }}
        run: |
          set -e
          for APP in "GozE8jtsbHVKg4Lx2Tmj6" "$WORKER"; do
            curl -sf -X POST -H "x-api-key: $KEY" -H "Content-Type: application/json" \
              -d "{\"applicationId\":\"$APP\",\"dockerImage\":\"$IMG\"}" \
              "$API/api/application.update" > /dev/null
            curl -sf -X POST -H "x-api-key: $KEY" -H "Content-Type: application/json" \
              -d "{\"applicationId\":\"$APP\"}" \
              "$API/api/application.deploy" > /dev/null
            echo "deployed $APP -> $IMG"
          done

  notify:
    needs: [test, build-image, deploy]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram on failure
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ CI failed on ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
