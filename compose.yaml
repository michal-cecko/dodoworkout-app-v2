# Dev compose — backing services only. Run the app via `composer dev`
# (artisan serve + queue:listen + pail + npm run dev concurrently).
services:
  pgsql:
    image: postgres:18-alpine
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE:-dodoworkout}'
      POSTGRES_USER: '${DB_USERNAME:-dodoworkout}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - dodoworkout-pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-dodoworkout}', '-U', '${DB_USERNAME:-dodoworkout}']
      retries: 3
      timeout: 5s

  redis:
    image: redis:alpine
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - dodoworkout-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s

volumes:
  dodoworkout-pgsql:
    driver: local
  dodoworkout-redis:
    driver: local
